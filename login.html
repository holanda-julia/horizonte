<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Projeto Horizonte</title>
  <meta name="description" content="Faça login no Projeto Horizonte para acessar seu planejamento financeiro.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-init.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #092c22;
      --green:       #0f4c3a;
      --green-light: #186851;
      --green-soft:  #eaf3f0;
      --gold:        #c29d66;
      --gold-hover:  #b28a52;
      --text:        #2c3e35;
      --muted:       #6b8276;
      --border:      rgba(194,157,102,0.25);
      --card-bg:     rgba(255,255,255,0.06);
      --radius:      16px;
      --transition:  all 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    html { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      background: var(--green-dark);
    }

    /* ── Animated background ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 80% at 20% 10%, rgba(15,76,58,0.6) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 80% 90%, rgba(194,157,102,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(9,44,34,0.9) 0%, transparent 100%);
      background-color: #071a14;
      z-index: 0;
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: float 12s ease-in-out infinite;
      z-index: 0;
    }
    .orb-1 { width: 500px; height: 500px; background: #0f4c3a; top: -15%; left: -10%; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #c29d66; bottom: -10%; right: -5%; animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: #186851; top: 50%; left: 60%; animation-delay: -8s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -20px) scale(1.05); }
      66%       { transform: translate(-20px, 15px) scale(0.97); }
    }

    /* Grid pattern overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(194,157,102,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(194,157,102,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── Login Card ── */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      animation: slideUp 0.6s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--green-light), var(--green-dark));
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      box-shadow: 0 8px 32px rgba(194,157,102,0.2), 0 0 0 1px rgba(194,157,102,0.15);
      font-size: 1.8rem;
    }
    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      color: #fff;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .login-logo p {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      margin-top: 0.3rem;
      font-weight: 300;
    }

    /* Card */
    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4), 0 0 0 1px rgba(194,157,102,0.08);
    }

    /* Tab toggle */
    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.8rem;
      gap: 4px;
    }
    .auth-tab {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.5);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.6rem 1rem;
      border-radius: 7px;
      cursor: pointer;
      transition: var(--transition);
    }
    .auth-tab.active {
      background: var(--gold);
      color: var(--green-dark);
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(194,157,102,0.3);
    }
    .auth-tab:not(.active):hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.05); }

    /* Forms */
    .auth-form { display: none; flex-direction: column; gap: 1rem; }
    .auth-form.active { display: flex; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

    .form-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .form-input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      transition: var(--transition);
      outline: none;
      width: 100%;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.28); }
    .form-input:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(194,157,102,0.15);
    }
    .form-input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 50px #0d3828 inset;
      -webkit-text-fill-color: #fff;
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-hover));
      color: var(--green-dark);
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.85rem 1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      margin-top: 0.25rem;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(194,157,102,0.35);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Google button */
    .btn-google {
      background: rgba(255,255,255,0.95);
      color: #333;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.85rem 1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      width: 100%;
    }
    .btn-google:hover:not(:disabled) {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }
    .btn-google:active { transform: translateY(0); }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-google svg { flex-shrink: 0; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.25rem 0;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .divider span {
      color: rgba(255,255,255,0.35);
      font-size: 0.75rem;
      white-space: nowrap;
    }

    /* Error message */
    .auth-error {
      background: rgba(220,53,69,0.15);
      border: 1px solid rgba(220,53,69,0.3);
      border-radius: 8px;
      color: #ff8a8a;
      font-size: 0.82rem;
      padding: 0.65rem 0.9rem;
      display: none;
      line-height: 1.4;
    }
    .auth-error.visible { display: block; animation: fadeIn 0.2s ease; }

    /* Success */
    .auth-success {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 8px;
      color: #6ee7b7;
      font-size: 0.82rem;
      padding: 0.65rem 0.9rem;
      display: none;
      line-height: 1.4;
    }
    .auth-success.visible { display: block; animation: fadeIn 0.2s ease; }

    /* Loading spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(9,44,34,0.3);
      border-top-color: var(--green-dark);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .loading .spinner { display: inline-block; }
    .loading .btn-label { display: none; }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: rgba(255,255,255,0.3);
      font-size: 0.75rem;
    }

    /* Password toggle */
    .input-wrapper { position: relative; }
    .input-wrapper .form-input { padding-right: 2.8rem; }
    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: rgba(255,255,255,0.7); }

    /* Responsivo */
    @media (max-width: 480px) {
      .login-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg-layer"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Login Card -->
  <div class="login-wrapper">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">🌅</div>
      <h1>Projeto Horizonte</h1>
      <p>Gestão financeira de Júlia Aragão</p>
    </div>

    <!-- Card -->
    <div class="login-card">

      <!-- Tab Toggle -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tab-login" role="tab" onclick="switchAuthTab('login')">Entrar</button>
        <button class="auth-tab" id="tab-register" role="tab" onclick="switchAuthTab('register')">Cadastrar</button>
      </div>

      <!-- ── Formulário: ENTRAR ── -->
      <div class="auth-form active" id="form-login">

        <!-- Google -->
        <button class="btn-google" id="btn-google-login" onclick="signInWithGoogle()">
          <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.4 30.2 0 24 0 14.6 0 6.6 5.5 2.6 13.5l7.8 6C12.2 13.3 17.6 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.7-.2-3.3-.5-4.9H24v9.3h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9C43.8 38 46.5 31.8 46.5 24.5z"/>
            <path fill="#FBBC05" d="M10.4 28.6A14.4 14.4 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.8.9 7.5 2.6 10.7l7.8-6.1z"/>
            <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.6-5.9c-2.1 1.4-4.7 2.2-7.6 2.2-6.4 0-11.8-3.8-13.6-9.2l-7.8 6C6.5 42.5 14.7 48 24 48z"/>
          </svg>
          <span>Entrar com Google</span>
        </button>

        <div class="divider"><span>ou com email e senha</span></div>

        <div id="login-error" class="auth-error"></div>

        <div class="form-group">
          <label class="form-label" for="login-email">E-mail</label>
          <input type="email" id="login-email" class="form-input" placeholder="julia@email.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Senha</label>
          <div class="input-wrapper">
            <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password">
            <button class="toggle-pw" onclick="togglePassword('login-password', this)" type="button" aria-label="Mostrar senha">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button class="btn-primary" id="btn-login" onclick="signInWithEmail()">
          <div class="spinner"></div>
          <span class="btn-label">Entrar</span>
        </button>

      </div>

      <!-- ── Formulário: CADASTRAR ── -->
      <div class="auth-form" id="form-register">

        <!-- Google -->
        <button class="btn-google" id="btn-google-register" onclick="signInWithGoogle()">
          <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.4 30.2 0 24 0 14.6 0 6.6 5.5 2.6 13.5l7.8 6C12.2 13.3 17.6 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.7-.2-3.3-.5-4.9H24v9.3h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9C43.8 38 46.5 31.8 46.5 24.5z"/>
            <path fill="#FBBC05" d="M10.4 28.6A14.4 14.4 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.8.9 7.5 2.6 10.7l7.8-6.1z"/>
            <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.6-5.9c-2.1 1.4-4.7 2.2-7.6 2.2-6.4 0-11.8-3.8-13.6-9.2l-7.8 6C6.5 42.5 14.7 48 24 48z"/>
          </svg>
          <span>Cadastrar com Google</span>
        </button>

        <div class="divider"><span>ou crie uma conta</span></div>

        <div id="register-error" class="auth-error"></div>
        <div id="register-success" class="auth-success"></div>

        <div class="form-group">
          <label class="form-label" for="register-name">Nome</label>
          <input type="text" id="register-name" class="form-input" placeholder="Júlia Aragão" autocomplete="name">
        </div>

        <div class="form-group">
          <label class="form-label" for="register-email">E-mail</label>
          <input type="email" id="register-email" class="form-input" placeholder="julia@email.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="register-password">Senha</label>
          <div class="input-wrapper">
            <input type="password" id="register-password" class="form-input" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
            <button class="toggle-pw" onclick="togglePassword('register-password', this)" type="button" aria-label="Mostrar senha">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button class="btn-primary" id="btn-register" onclick="registerWithEmail()">
          <div class="spinner"></div>
          <span class="btn-label">Criar Conta</span>
        </button>

      </div>

    </div><!-- /login-card -->

    <div class="login-footer">
      Seus dados são protegidos com criptografia Firebase &nbsp;🔒
    </div>

  </div><!-- /login-wrapper -->

  <script src="auth.js"></script>
</body>
</html>
